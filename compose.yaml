name: asihjaya-rms

services:
  db:
    image: postgres:17-bookworm
    container_name: asihjaya-rms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: asihjaya_rms
      POSTGRES_USER: asihjaya
      POSTGRES_PASSWORD: asihjaya_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asihjaya -d asihjaya_rms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
